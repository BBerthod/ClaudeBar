name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Swift Release Build
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (release)
        run: swift build -c release 2>&1 | tee build.log

      - name: Fail on warnings
        run: |
          if grep -E "warning:" build.log; then
            echo "Build warnings detected — failing."
            exit 1
          fi

      - name: Binary size
        run: |
          BIN=$(swift build -c release --show-bin-path 2>/dev/null)/ClaudeBar
          if [ -f "$BIN" ]; then
            SIZE=$(du -sh "$BIN" | cut -f1)
            echo "Binary size: $SIZE"
          fi
